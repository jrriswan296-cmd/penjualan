<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basreng Pedas Gila</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #fff8f0;
      color: #333;
    }

    header {
      background: #ff5722;
      color: white;
      text-align: center;
      padding: 30px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    header p {
      margin-top: 10px;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 15px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      font-weight: bold;
      margin: 10px 0;
    }

    button {
      background: #25D366;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1ebe5d;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>

<header>
  <h1>Basreng Pedas Gila 🔥</h1>
  <p>Gurih, pedas, nagih! Cocok buat ngemil kapan aja.</p>
</header>

<div class="container">
  <h2>Menu Kami</h2>

  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="Basreng Original">
      <h3>Basreng Original</h3>
      <p class="price">Rp10.000</p>
      <a href="https://wa.me/6281234567890?text=Halo%20saya%20mau%20pesan%20Basreng%20Original">
        <button>Pesan via WhatsApp</button>
      </a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="Basreng Pedas">
      <h3>Basreng Pedas</h3>
      <p class="price">Rp12.000</p>
      <a href="https://wa.me/6281234567890?text=Halo%20saya%20mau%20pesan%20Basreng%20Pedas">
        <button>Pesan via WhatsApp</button>
      </a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="Basreng Level 5">
      <h3>Basreng Level 5 🔥🔥🔥🔥🔥</h3>
      <p class="price">Rp15.000</p>
      <a href="https://wa.me/6281234567890?text=Halo%20saya%20mau%20pesan%20Basreng%20Level%205">
        <button>Pesan via WhatsApp</button>
      </a>
    </div>

  </div>

  <h2 style="margin-top:40px;">Testimoni</h2>
  <p>⭐⭐⭐⭐⭐ "Enak banget, pedasnya nampol!"</p>
  <p>⭐⭐⭐⭐⭐ "Beli lagi dan lagi!"</p>

</div>

<footer>
  <p>© 2026 Basreng Pedas Gila</p>
</footer>

</body>
</html>
